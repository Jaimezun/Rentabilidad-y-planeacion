<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP — Iniciar sesión</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;border:1px solid #e0e0d8;padding:40px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:22px;font-weight:700;color:#1a1a1a}
.logo p{font-size:13px;color:#888;margin-top:4px}
.field{margin-bottom:16px}
label{font-size:12px;color:#666;display:block;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
input{width:100%;padding:10px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:15px;font-family:inherit;outline:none;transition:border-color 0.15s}
input:focus{border-color:#1a1a1a}
.btn{width:100%;padding:12px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;font-size:15px;font-family:inherit;font-weight:600;cursor:pointer;margin-top:8px;transition:background 0.15s}
.btn:hover{background:#333}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;background:#fde8e8;color:#c0392b;border:1px solid #f0a0a0;display:none}
.divider{border:none;border-top:1px solid #e0e0d8;margin:24px 0}
.roles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:24px}
.role-btn{padding:10px 8px;border-radius:8px;border:1px solid #e0e0d8;background:#f8f8f4;color:#666;font-size:12px;font-family:inherit;cursor:pointer;text-align:center;font-weight:500;transition:all 0.15s}
.role-btn:hover{border-color:#1a1a1a;color:#1a1a1a;background:#fff}
.role-btn.active{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>ERP Producción</h1>
    <p>Módulo de reciclaje y planeación</p>
  </div>
  <div id="alert-msg" class="alert"></div>
  <div class="field">
    <label>Usuario</label>
    <input type="text" id="username" placeholder="Tu usuario" autocomplete="username">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password">
  </div>
  <button class="btn" onclick="login()">Iniciar sesión</button>
  <div class="divider"></div>
  <p style="font-size:12px;color:#aaa;text-align:center">Acceso admin/operador → ERP completo<br>Acceso cliente → Portal de reportes</p>
</div>
<script>
// Usuarios internos por defecto
const DEFAULT_USERS=[
  {username:'admin',password:'admin123',role:'admin',nombre:'Administrador'},
  {username:'operador',password:'op123',role:'operador',nombre:'Operador'}
];

function getState(){
  try{const r=localStorage.getItem('erp_state');return r?JSON.parse(r):null;}catch(e){return null;}
}

function login(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  const alertEl=document.getElementById('alert-msg');
  alertEl.style.display='none';
  if(!username||!password){showAlert('Ingresa usuario y contraseña.');return;}
  // Verificar usuarios internos
  const interno=DEFAULT_USERS.find(u=>u.username===username&&u.password===password);
  if(interno){
    localStorage.setItem('erp_session',JSON.stringify(interno));
    window.location.href='erp.html';return;
  }
  // Verificar clientes
  const st=getState();
  if(st&&st.clientes){
    const cliente=st.clientes.find(c=>c.usuario===username&&c.password===password);
    if(cliente){
      localStorage.setItem('erp_session',JSON.stringify({username:cliente.usuario,nombre:cliente.nombre,role:'cliente',clienteId:cliente.id}));
      window.location.href='portal.html';return;
    }
  }
  showAlert('Usuario o contraseña incorrectos.');
}
function showAlert(msg){const el=document.getElementById('alert-msg');el.textContent=msg;el.style.display='block';}
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
document.getElementById('username').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('password').focus();});
</script>
</body>
</html>
